name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., "latest", "v1.0.0")'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: trashcluster/otis-backend
  IMAGE_NAME_WORKER: trashcluster/otis-worker
  IMAGE_NAME_FRONTEND: trashcluster/otis-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use || docker buildx use default

      - name: Log in to Docker Hub
        run: |
          echo '${{ secrets.DOCKERHUB_TOKEN }}' | docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' --password-stdin ${{ env.REGISTRY }}

      - name: Determine image tags
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building images with tag: ${TAG}"

      - name: Build and push Backend
        run: |
          docker buildx build \
            --push \
            --tag ${{ env.IMAGE_NAME_BACKEND }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ env.IMAGE_NAME_BACKEND }}:latest \
            --file ./backend/Dockerfile \
            ./backend

      - name: Build and push Worker
        run: |
          docker buildx build \
            --push \
            --tag ${{ env.IMAGE_NAME_WORKER }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ env.IMAGE_NAME_WORKER }}:latest \
            --file ./worker/Dockerfile \
            ./worker

      - name: Build and push Frontend
        run: |
          docker buildx build \
            --push \
            --tag ${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.meta.outputs.tag }} \
            --tag ${{ env.IMAGE_NAME_FRONTEND }}:latest \
            --file ./frontend/Dockerfile \
            ./frontend

      - name: Logout from Docker Hub
        if: always()
        run: docker logout
