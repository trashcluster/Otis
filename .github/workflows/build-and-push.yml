name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Custom image tag (e.g., "latest", "v1.0.0")'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_NAME_BACKEND: trashcluster/otis-backend
  IMAGE_NAME_WORKER: trashcluster/otis-worker
  IMAGE_NAME_FRONTEND: trashcluster/otis-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="latest"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Building images with tag: ${TAG}"

      - name: Build and push Backend
        uses: docker/build-and-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_BACKEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME_BACKEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME_BACKEND }}:buildcache,mode=max

      - name: Build and push Worker
        uses: docker/build-and-push-action@v5
        with:
          context: ./worker
          file: ./worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_WORKER }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_WORKER }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME_WORKER }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME_WORKER }}:buildcache,mode=max

      - name: Build and push Frontend
        uses: docker/build-and-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_FRONTEND }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME_FRONTEND }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME_FRONTEND }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME_FRONTEND }}:buildcache,mode=max
