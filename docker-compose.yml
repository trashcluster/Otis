version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: otis-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: otis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otis-network

  # Redis Queue
  redis:
    image: redis:7-alpine
    container_name: otis-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otis-network

  # MinIO S3-Compatible Storage
  minio:
    image: minio/minio:latest
    container_name: otis-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otis-network

  # Backend API (References Docker Hub image by default)
  backend:
    image: trashcluster/otis-backend:${IMAGE_TAG:-latest}
    container_name: otis-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/otis
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: otis
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      IMAGE_TAG: ${IMAGE_TAG:-latest}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - otis-network
    # Uncomment below to build locally instead of pulling from Docker Hub
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile

  # Worker Service (References Docker Hub image by default)
  worker:
    image: trashcluster/otis-worker:${IMAGE_TAG:-latest}
    container_name: otis-worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/otis
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: otis
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - otis-network
    # Uncomment below to build locally instead of pulling from Docker Hub
    # build:
    #   context: ./worker
    #   dockerfile: Dockerfile

  # Frontend Web UI (References Docker Hub image by default)
  frontend:
    image: trashcluster/otis-frontend:${IMAGE_TAG:-latest}
    container_name: otis-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:8000
    networks:
      - otis-network
    # Uncomment below to build locally instead of pulling from Docker Hub
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile

networks:
  otis-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
